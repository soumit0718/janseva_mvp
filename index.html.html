<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JAN SEVA — जन सेवा | Local Governance Platform</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #FEFAE0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #2D6A4F; border-radius: 3px; }
    select, input, textarea, button { font-family: Georgia, serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const C = {
      saffron: "#FF6B35", green: "#2D6A4F", greenLight: "#52B788",
      greenPale: "#D8F3DC", navy: "#1B2A4A", navyMid: "#2E4270",
      gold: "#F4A261", cream: "#FEFAE0", white: "#FFFFFF",
      gray100: "#F1F5F9", gray300: "#CBD5E1", gray500: "#64748B",
      gray700: "#334155", red: "#E53E3E", blue: "#3182CE",
    };

    const USERS = {
      citizen:    { id:"c1", name:"Ramesh Patil",      role:"citizen",               ward:"Ward 7",      location:"Nashik Municipality",          avatar:"RP" },
      admin_ward: { id:"a1", name:"Priya Sharma",       role:"ward_officer",          ward:"Ward 7",      location:"Nashik Municipality",          avatar:"PS" },
      admin_gram: { id:"a2", name:"Suresh Jadhav",      role:"gram_pradhan",          ward:"Koregaon GP", location:"Koregaon Gram Panchayat",      avatar:"SJ" },
      admin_muni: { id:"a3", name:"Collector Mehta",    role:"municipal_commissioner",ward:"All Wards",   location:"Nashik Municipality",          avatar:"CM" },
    };

    const ISSUES_INIT = [
      { id:"ISS001", title:"Broken streetlight on Main Road",    category:"Infrastructure",         status:"In Progress",  priority:"High",     level:"ward",         location:"Ward 7, Near Bus Stop",       submittedBy:"Ramesh Patil",    date:"2026-02-28", upvotes:34, description:"Three streetlights have been non-functional for 2 weeks causing safety concerns at night.", assignedTo:"Ward Engineer",      comments:[{author:"Ward Officer",  text:"Work order raised. Team will visit in 2 days.", date:"2026-03-01"}] },
      { id:"ISS002", title:"Water supply disruption – 3 days",   category:"Water & Sanitation",     status:"Resolved",     priority:"Critical", level:"gram",         location:"Koregaon GP, Sector B",       submittedBy:"Anita Deshpande", date:"2026-02-20", upvotes:89, description:"Complete water supply failure for 3 consecutive days. Borewell also non-functional.", assignedTo:"GP Water Committee", comments:[{author:"Gram Pradhan", text:"Emergency water tanker arranged. Pipeline repair completed.", date:"2026-02-23"}] },
      { id:"ISS003", title:"Garbage not collected – 10 days",    category:"Sanitation",             status:"Open",         priority:"High",     level:"municipality", location:"Ward 12, Sector C",           submittedBy:"Mohan Kulkarni",  date:"2026-03-01", upvotes:56, description:"Municipal garbage truck not collecting from our street for over 10 days. Causing hygiene issues.", assignedTo:null, comments:[] },
      { id:"ISS004", title:"Road pothole causing accidents",      category:"Infrastructure",         status:"Under Review", priority:"Medium",   level:"ward",         location:"Ward 7, SH-27",               submittedBy:"Kavita More",     date:"2026-03-03", upvotes:21, description:"Large pothole on state highway near school. Two minor accidents reported.", assignedTo:null, comments:[] },
      { id:"ISS005", title:"Birth certificate delay – 3 months", category:"Documents & Certificates",status:"Open",        priority:"Medium",   level:"municipality", location:"Nashik Municipality Office",  submittedBy:"Deepak Nair",     date:"2026-03-04", upvotes:12, description:"Applied for birth certificate 3 months ago. Multiple follow-ups. No response from office.", assignedTo:null, comments:[] },
    ];

    const SCHEMES = [
      { id:"S1", name:"PM Awas Yojana",           category:"Housing",     eligibility:"BPL families",           deadline:"2026-06-30", applied:234,  benefit:"₹1.2 Lakh subsidy" },
      { id:"S2", name:"Jal Jeevan Mission",        category:"Water",       eligibility:"Rural households",       deadline:"Ongoing",    applied:567,  benefit:"Piped water connection" },
      { id:"S3", name:"Swachh Bharat Mission",     category:"Sanitation",  eligibility:"All households",         deadline:"2026-12-31", applied:890,  benefit:"Toilet construction grant" },
      { id:"S4", name:"Kisan Samman Nidhi",        category:"Agriculture", eligibility:"Small/Marginal farmers", deadline:"Ongoing",    applied:1203, benefit:"₹6000/year" },
      { id:"S5", name:"Pradhan Mantri Ujjwala",    category:"Energy",      eligibility:"BPL women",              deadline:"2026-09-30", applied:445,  benefit:"Free LPG connection" },
    ];

    const MEETINGS = [
      { id:"M1", title:"Ward 7 Gram Sabha",      date:"2026-03-15", time:"10:00 AM", venue:"Community Hall, Ward 7",   agenda:["Road repair budget approval","Water connection applications","Streetlight tender review"], attendees:45 },
      { id:"M2", title:"Municipal Budget Review", date:"2026-03-20", time:"11:00 AM", venue:"Municipal Headquarters",    agenda:["FY2026-27 Budget presentation","Infrastructure projects","Citizen grievance report"],     attendees:12 },
    ];

    const AI_FALLBACK = {
      complaint:   "To file a complaint:\n1. Click 'Report Issue' button\n2. Select category (Water, Road, Electricity etc.)\n3. Describe the problem clearly\n4. Submit — you'll get a tracking ID\n\nYour complaint goes directly to the concerned officer. You can track it anytime!",
      scheme:      "For PM Awas Yojana:\nDocuments needed:\n• Aadhaar card\n• Income certificate (below ₹1.8 lakh)\n• Land ownership proof\n• Bank account details\n• Ration card\n\nApply at your nearest Gram Panchayat or Municipal office. Application is FREE!",
      certificate: "For Birth Certificate:\nRequired documents:\n• Hospital discharge slip OR midwife certificate\n• Parent's Aadhaar cards\n• Marriage certificate of parents\n\nTimeline: 7-15 working days\nFee: ₹10 (government fee)\n\nApply at eGramSwaraj portal or your ward office.",
      water:       "For water supply complaints:\n1. File complaint here with your address\n2. Mention duration of disruption\n3. Nearby landmark helps\n\nEmergency: Call 1916 (Municipal helpline)\n\nIf unresolved in 48 hours, escalate to Municipal Commissioner.",
      default:     "Namaste! I'm Jan Sahayak, your AI helper for local governance.\n\nAsk me about:\n• How to file a complaint\n• Government schemes you qualify for\n• Documents required for certificates\n• Meeting schedules\n• Status of your issues",
    };

    // ── Badge ─────────────────────────────────────────────────────
    function Badge({ text }) {
      const map = {
        "Open":         { bg:"#FEF3C7", tx:"#92400E" },
        "In Progress":  { bg:"#DBEAFE", tx:"#1E40AF" },
        "Resolved":     { bg:"#D1FAE5", tx:"#065F46" },
        "Under Review": { bg:"#EDE9FE", tx:"#5B21B6" },
        "Critical":     { bg:"#FEE2E2", tx:"#991B1B" },
        "High":         { bg:"#FFEDD5", tx:"#9A3412" },
        "Medium":       { bg:"#FEF9C3", tx:"#713F12" },
        "Low":          { bg:"#F0FDF4", tx:"#166534" },
        "ward":         { bg:"#E0F2FE", tx:"#0369A1" },
        "gram":         { bg:"#F0FDF4", tx:"#15803D" },
        "municipality": { bg:"#FDF4FF", tx:"#7E22CE" },
      };
      const s = map[text] || { bg:C.gray100, tx:C.gray700 };
      return <span style={{ background:s.bg, color:s.tx, padding:"2px 10px", borderRadius:20, fontSize:11, fontWeight:700, letterSpacing:0.3, display:"inline-block" }}>{text}</span>;
    }

    function Avatar({ initials, size=36, bg=C.navyMid }) {
      return <div style={{ width:size, height:size, borderRadius:"50%", background:bg, color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:size*0.38, flexShrink:0 }}>{initials}</div>;
    }

    function StatCard({ icon, label, value, sub, color }) {
      return (
        <div style={{ background:"#fff", borderRadius:16, padding:"20px 24px", border:`1px solid ${C.gray300}`, display:"flex", alignItems:"center", gap:16, flex:1, minWidth:140 }}>
          <div style={{ width:48, height:48, borderRadius:12, background:color+"20", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>{icon}</div>
          <div>
            <div style={{ fontSize:26, fontWeight:800, color:C.navy }}>{value}</div>
            <div style={{ fontSize:12, color:C.gray500, fontWeight:600 }}>{label}</div>
            {sub && <div style={{ fontSize:11, color, fontWeight:700 }}>{sub}</div>}
          </div>
        </div>
      );
    }

    // ── AI Chat ───────────────────────────────────────────────────
    function AIChat({ onClose }) {
      const [messages, setMessages] = useState([{ role:"ai", text:AI_FALLBACK.default }]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const endRef = useRef(null);
      useEffect(() => { endRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages]);

      const getFallback = (msg) => {
        const l = msg.toLowerCase();
        if (l.includes("complaint")||l.includes("issue")||l.includes("problem")) return AI_FALLBACK.complaint;
        if (l.includes("scheme")||l.includes("yojana")||l.includes("awas"))      return AI_FALLBACK.scheme;
        if (l.includes("certificate")||l.includes("birth")||l.includes("document")) return AI_FALLBACK.certificate;
        if (l.includes("water")||l.includes("pipeline")||l.includes("tank"))     return AI_FALLBACK.water;
        return "I can help with complaints, government schemes, certificates, and local governance queries. Please be more specific about what you need!";
      };

      const send = async () => {
        if (!input.trim()) return;
        const userMsg = input.trim();
        setInput("");
        setMessages(m => [...m, { role:"user", text:userMsg }]);
        setLoading(true);
        let reply = getFallback(userMsg);
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
              model:"claude-sonnet-4-20250514", max_tokens:400,
              system:`You are Jan Sahayak, an AI assistant for Indian local governance (Gram Panchayat and Municipality). Help citizens in simple, friendly language. Topics: complaints/grievances, government schemes, certificates (birth/death/caste/income), water/sanitation, roads, meetings, ration cards. Keep responses concise (under 150 words). Use bullet points. Be empathetic. Mix Hindi words naturally.`,
              messages:[{ role:"user", content:userMsg }],
            }),
          });
          if (res.ok) { const d = await res.json(); reply = d.content?.[0]?.text || reply; }
        } catch(e) {}
        setLoading(false);
        setMessages(m => [...m, { role:"ai", text:reply }]);
      };

      return (
        <div style={{ position:"fixed", bottom:90, right:24, width:340, height:460, background:"#fff", borderRadius:20, boxShadow:"0 20px 60px rgba(0,0,0,0.25)", display:"flex", flexDirection:"column", zIndex:1000, border:`2px solid ${C.greenLight}`, overflow:"hidden" }}>
          <div style={{ background:`linear-gradient(135deg,${C.green},${C.navyMid})`, padding:"14px 18px", display:"flex", alignItems:"center", gap:12 }}>
            <div style={{ width:36, height:36, borderRadius:"50%", background:"#ffffff30", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>🤖</div>
            <div style={{ flex:1 }}>
              <div style={{ color:"#fff", fontWeight:800, fontSize:14 }}>Jan Sahayak AI</div>
              <div style={{ color:"#ffffff90", fontSize:11 }}>Your governance helper • जन सहायक</div>
            </div>
            <button onClick={onClose} style={{ background:"none", border:"none", color:"#fff", fontSize:22, cursor:"pointer", lineHeight:1 }}>×</button>
          </div>
          <div style={{ flex:1, overflowY:"auto", padding:14, display:"flex", flexDirection:"column", gap:10 }}>
            {messages.map((m,i) => (
              <div key={i} style={{ display:"flex", justifyContent:m.role==="user"?"flex-end":"flex-start" }}>
                <div style={{ maxWidth:"85%", padding:"10px 14px", borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px", background:m.role==="user"?C.navy:C.gray100, color:m.role==="user"?"#fff":C.navy, fontSize:13, lineHeight:1.6, whiteSpace:"pre-wrap" }}>
                  {m.text}
                </div>
              </div>
            ))}
            {loading && <div style={{ alignSelf:"flex-start", background:C.gray100, padding:"10px 14px", borderRadius:"18px 18px 18px 4px", fontSize:13, color:C.gray500 }}>Thinking… ●●●</div>}
            <div ref={endRef}/>
          </div>
          <div style={{ padding:"6px 14px", display:"flex", gap:6, flexWrap:"wrap" }}>
            {["File complaint","Check scheme","Get certificate"].map(q => (
              <button key={q} onClick={() => setInput(q)} style={{ fontSize:11, padding:"4px 10px", background:C.greenPale, color:C.green, border:`1px solid ${C.greenLight}`, borderRadius:20, cursor:"pointer", fontWeight:600 }}>{q}</button>
            ))}
          </div>
          <div style={{ padding:"10px 14px", borderTop:`1px solid ${C.gray300}`, display:"flex", gap:8 }}>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Ask anything about governance…" style={{ flex:1, padding:"10px 14px", borderRadius:12, border:`1px solid ${C.gray300}`, fontSize:13, outline:"none" }}/>
            <button onClick={send} style={{ background:C.green, color:"#fff", border:"none", borderRadius:12, padding:"10px 16px", cursor:"pointer", fontSize:16 }}>↑</button>
          </div>
        </div>
      );
    }

    // ── Issue Card ────────────────────────────────────────────────
    function IssueCard({ issue, isAdmin, onUpdate }) {
      const [expanded, setExpanded] = useState(false);
      return (
        <div style={{ background:"#fff", borderRadius:16, border:`1px solid ${C.gray300}`, overflow:"hidden", marginBottom:12 }}>
          <div style={{ padding:"16px 20px", cursor:"pointer" }} onClick={() => setExpanded(!expanded)}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12 }}>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", gap:6, marginBottom:8, flexWrap:"wrap" }}>
                  <Badge text={issue.status}/> <Badge text={issue.priority}/> <Badge text={issue.level}/>
                </div>
                <div style={{ fontWeight:700, color:C.navy, fontSize:15, marginBottom:4 }}>{issue.title}</div>
                <div style={{ fontSize:12, color:C.gray500 }}>📍 {issue.location} • 📅 {issue.date} • {issue.id}</div>
              </div>
              <div style={{ textAlign:"center", flexShrink:0 }}>
                <div style={{ fontSize:20, fontWeight:800, color:C.saffron }}>{issue.upvotes}</div>
                <div style={{ fontSize:10, color:C.gray500 }}>VOTES</div>
              </div>
            </div>
          </div>
          {expanded && (
            <div style={{ padding:"0 20px 16px", borderTop:`1px solid ${C.gray100}` }}>
              <p style={{ color:C.gray700, fontSize:13, margin:"12px 0", lineHeight:1.7 }}>{issue.description}</p>
              {issue.assignedTo && <div style={{ fontSize:12, color:C.green, fontWeight:700, marginBottom:12 }}>👷 Assigned to: {issue.assignedTo}</div>}
              {issue.comments.length > 0 && (
                <div style={{ background:C.gray100, borderRadius:12, padding:12, marginBottom:12 }}>
                  <div style={{ fontSize:12, fontWeight:700, color:C.gray700, marginBottom:8 }}>UPDATES</div>
                  {issue.comments.map((c,i) => (
                    <div key={i} style={{ marginBottom:6 }}>
                      <div style={{ fontSize:12, fontWeight:700, color:C.navyMid }}>{c.author} <span style={{ color:C.gray500, fontWeight:400 }}>• {c.date}</span></div>
                      <div style={{ fontSize:13, color:C.gray700 }}>{c.text}</div>
                    </div>
                  ))}
                </div>
              )}
              {isAdmin && (
                <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                  {["Open","In Progress","Under Review","Resolved"].map(s => (
                    <button key={s} onClick={() => onUpdate(issue.id,{status:s})} style={{ fontSize:11, padding:"6px 12px", background:issue.status===s?C.navy:C.gray100, color:issue.status===s?"#fff":C.gray700, border:"none", borderRadius:8, cursor:"pointer", fontWeight:600 }}>{s}</button>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── Report Modal ──────────────────────────────────────────────
    function ReportModal({ onClose, onSubmit }) {
      const [form, setForm] = useState({ title:"", category:"Infrastructure", description:"", location:"", priority:"Medium", level:"ward" });
      const set = (k,v) => setForm(f => ({...f,[k]:v}));
      return (
        <div style={{ position:"fixed", inset:0, background:"#00000080", zIndex:900, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
          <div style={{ background:"#fff", borderRadius:20, width:"100%", maxWidth:520, maxHeight:"90vh", overflowY:"auto" }}>
            <div style={{ background:`linear-gradient(135deg,${C.saffron},${C.gold})`, padding:"20px 24px", borderRadius:"20px 20px 0 0" }}>
              <div style={{ fontWeight:800, fontSize:18, color:"#fff" }}>📢 Report an Issue</div>
              <div style={{ color:"#ffffff90", fontSize:13 }}>Your voice matters — शिकायत दर्ज करें</div>
            </div>
            <div style={{ padding:24, display:"flex", flexDirection:"column", gap:14 }}>
              <div>
                <label style={{ fontSize:12, fontWeight:700, color:C.gray700, display:"block", marginBottom:6 }}>Issue Title *</label>
                <input value={form.title} onChange={e=>set("title",e.target.value)} placeholder="Brief description of the problem" style={{ width:"100%", padding:"10px 14px", borderRadius:10, border:`1px solid ${C.gray300}`, fontSize:13 }}/>
              </div>
              <div>
                <label style={{ fontSize:12, fontWeight:700, color:C.gray700, display:"block", marginBottom:6 }}>Your Location / Address *</label>
                <input value={form.location} onChange={e=>set("location",e.target.value)} placeholder="Ward, Street, Landmark" style={{ width:"100%", padding:"10px 14px", borderRadius:10, border:`1px solid ${C.gray300}`, fontSize:13 }}/>
              </div>
              <div>
                <label style={{ fontSize:12, fontWeight:700, color:C.gray700, display:"block", marginBottom:6 }}>Detailed Description *</label>
                <textarea value={form.description} onChange={e=>set("description",e.target.value)} placeholder="Describe the problem in detail. When did it start? How many people affected?" rows={3} style={{ width:"100%", padding:"10px 14px", borderRadius:10, border:`1px solid ${C.gray300}`, fontSize:13, resize:"vertical" }}/>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
                {[
                  { label:"Category", key:"category", opts:["Infrastructure","Water & Sanitation","Electricity","Documents & Certificates","Sanitation","Health","Other"] },
                  { label:"Priority",  key:"priority",  opts:["Low","Medium","High","Critical"] },
                  { label:"Level",     key:"level",     opts:["ward","gram","municipality"] },
                ].map(f => (
                  <div key={f.key}>
                    <label style={{ fontSize:12, fontWeight:700, color:C.gray700, display:"block", marginBottom:6 }}>{f.label}</label>
                    <select value={form[f.key]} onChange={e=>set(f.key,e.target.value)} style={{ width:"100%", padding:"10px 8px", borderRadius:10, border:`1px solid ${C.gray300}`, fontSize:12, background:"#fff" }}>
                      {f.opts.map(o=><option key={o}>{o}</option>)}
                    </select>
                  </div>
                ))}
              </div>
              <div style={{ display:"flex", gap:12, marginTop:4 }}>
                <button onClick={onClose} style={{ flex:1, padding:12, background:C.gray100, color:C.gray700, border:"none", borderRadius:12, fontWeight:700, cursor:"pointer" }}>Cancel</button>
                <button onClick={()=>onSubmit(form)} style={{ flex:2, padding:12, background:`linear-gradient(135deg,${C.green},${C.navyMid})`, color:"#fff", border:"none", borderRadius:12, fontWeight:700, cursor:"pointer", fontSize:14 }}>Submit Complaint ✓</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Main App ──────────────────────────────────────────────────
    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [activeTab, setActiveTab]     = useState("dashboard");
      const [issues, setIssues]           = useState(ISSUES_INIT);
      const [showChat, setShowChat]       = useState(false);
      const [showReport, setShowReport]   = useState(false);
      const [filterStatus, setFilterStatus] = useState("All");
      const [filterLevel, setFilterLevel]   = useState("All");
      const [toast, setToast]             = useState(null);

      const showToast = (msg, color=C.green) => { setToast({msg,color}); setTimeout(()=>setToast(null),3500); };
      const isAdmin = currentUser && currentUser.role !== "citizen";

      const handleSubmitIssue = (form) => {
        if (!form.title||!form.description||!form.location) { showToast("Please fill all required fields",C.red); return; }
        const n = { id:"ISS"+String(issues.length+1).padStart(3,"0"), ...form, status:"Open", submittedBy:currentUser.name, date:new Date().toISOString().slice(0,10), upvotes:1, comments:[], assignedTo:null };
        setIssues([n,...issues]);
        setShowReport(false);
        showToast(`✅ Issue reported! ID: ${n.id}`);
      };

      const handleUpdateIssue = (id, updates) => { setIssues(issues.map(i=>i.id===id?{...i,...updates}:i)); showToast("Issue updated!"); };

      const filteredIssues = issues.filter(i => {
        if (filterStatus!=="All" && i.status!==filterStatus) return false;
        if (filterLevel!=="All"  && i.level!==filterLevel)  return false;
        return true;
      });

      const stats = { total:issues.length, open:issues.filter(i=>i.status==="Open").length, inProgress:issues.filter(i=>i.status==="In Progress").length, resolved:issues.filter(i=>i.status==="Resolved").length };

      // ── Login screen ──────────────────────────────────────────
      if (!currentUser) return (
        <div style={{ minHeight:"100vh", background:`linear-gradient(160deg,${C.navy} 0%,${C.navyMid} 50%,${C.green} 100%)`, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
          <div style={{ width:"100%", maxWidth:440 }}>
            <div style={{ textAlign:"center", marginBottom:32 }}>
              <div style={{ fontSize:56, marginBottom:8 }}>🏛️</div>
              <div style={{ fontSize:32, fontWeight:900, color:"#fff", letterSpacing:-1 }}>JAN SEVA</div>
              <div style={{ fontSize:14, color:"#ffffff80", letterSpacing:2 }}>जन सेवा • LOCAL GOVERNANCE PLATFORM</div>
              <div style={{ height:2, background:`linear-gradient(90deg,transparent,${C.gold},transparent)`, margin:"16px auto", width:200 }}/>
              <div style={{ fontSize:12, color:"#ffffff60" }}>Municipality • Gram Panchayat • Ward</div>
            </div>
            <div style={{ background:"#ffffff15", borderRadius:20, padding:24, border:"1px solid #ffffff20" }}>
              <div style={{ fontSize:13, fontWeight:700, color:"#ffffff80", marginBottom:16, textAlign:"center", letterSpacing:1 }}>SELECT YOUR ROLE TO CONTINUE</div>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {[
                  { key:"citizen",    label:"Citizen / नागरिक",       sub:"Report issues, track complaints, apply for schemes", icon:"👤", color:C.saffron },
                  { key:"admin_ward", label:"Ward Officer",             sub:"Manage Ward 7 issues and citizen requests",          icon:"🏘️", color:C.greenLight },
                  { key:"admin_gram", label:"Gram Pradhan",             sub:"Koregaon Gram Panchayat administration",             icon:"🌾", color:C.gold },
                  { key:"admin_muni", label:"Municipal Commissioner",   sub:"Full municipality oversight and analytics",          icon:"🏛️", color:C.blue },
                ].map(u => (
                  <button key={u.key} onClick={()=>{ setCurrentUser(USERS[u.key]); setActiveTab("dashboard"); }}
                    style={{ background:"#ffffff12", border:`1px solid ${u.color}40`, borderRadius:14, padding:"14px 18px", display:"flex", alignItems:"center", gap:14, cursor:"pointer", textAlign:"left", color:"#fff", transition:"background 0.2s" }}
                    onMouseEnter={e=>{ e.currentTarget.style.background=u.color+"30"; e.currentTarget.style.borderColor=u.color; }}
                    onMouseLeave={e=>{ e.currentTarget.style.background="#ffffff12"; e.currentTarget.style.borderColor=u.color+"40"; }}>
                    <span style={{ fontSize:28 }}>{u.icon}</span>
                    <div><div style={{ fontWeight:800, fontSize:14 }}>{u.label}</div><div style={{ fontSize:11, color:"#ffffff70" }}>{u.sub}</div></div>
                  </button>
                ))}
              </div>
            </div>
            <div style={{ textAlign:"center", marginTop:16, color:"#ffffff40", fontSize:11 }}>Demo prototype • No real data stored</div>
          </div>
        </div>
      );

      // ── Tabs ──────────────────────────────────────────────────
      const tabs = [
        { id:"dashboard", label:"Dashboard", icon:"📊" },
        { id:"issues",    label:isAdmin?"Issues":"My Issues", icon:"📋" },
        { id:"schemes",   label:"Schemes",  icon:"📜" },
        { id:"meetings",  label:"Meetings", icon:"🤝" },
      ];

      return (
        <div style={{ minHeight:"100vh", background:C.cream }}>
          {toast && <div style={{ position:"fixed", top:20, right:20, background:toast.color, color:"#fff", padding:"12px 20px", borderRadius:12, fontWeight:700, fontSize:14, zIndex:2000, boxShadow:"0 8px 24px rgba(0,0,0,0.2)" }}>{toast.msg}</div>}

          {/* Header */}
          <div style={{ background:`linear-gradient(135deg,${C.navy},${C.navyMid})`, padding:"0 20px", position:"sticky", top:0, zIndex:100, boxShadow:"0 4px 20px rgba(0,0,0,0.3)" }}>
            <div style={{ maxWidth:1100, margin:"0 auto", display:"flex", alignItems:"center", gap:16, height:60 }}>
              <div style={{ fontSize:22 }}>🏛️</div>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:900, color:"#fff", fontSize:16, lineHeight:1 }}>JAN SEVA</div>
                <div style={{ color:"#ffffff60", fontSize:10 }}>{currentUser.location}</div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ textAlign:"right" }}>
                  <div style={{ color:"#fff", fontSize:12, fontWeight:700 }}>{currentUser.name}</div>
                  <div style={{ color:"#ffffff60", fontSize:10 }}>{currentUser.ward}</div>
                </div>
                <Avatar initials={currentUser.avatar} size={36}/>
                <button onClick={()=>{ setCurrentUser(null); setActiveTab("dashboard"); }} style={{ background:"#ffffff20", border:"none", color:"#fff", padding:"6px 12px", borderRadius:8, cursor:"pointer", fontSize:11, fontWeight:700 }}>LOGOUT</button>
              </div>
            </div>
            <div style={{ maxWidth:1100, margin:"0 auto", display:"flex", gap:4 }}>
              {tabs.map(t => (
                <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{ background:activeTab===t.id?`linear-gradient(135deg,${C.saffron},${C.gold})`:"transparent", border:"none", color:activeTab===t.id?"#fff":"#ffffff70", padding:"10px 18px", cursor:"pointer", fontWeight:700, fontSize:12, borderRadius:"10px 10px 0 0" }}>
                  {t.icon} {t.label}
                </button>
              ))}
            </div>
          </div>

          {/* Main content */}
          <div style={{ maxWidth:1100, margin:"0 auto", padding:"24px 20px" }}>

            {/* DASHBOARD */}
            {activeTab==="dashboard" && (
              <div>
                <div style={{ background:`linear-gradient(135deg,${C.green},${C.navyMid})`, borderRadius:20, padding:"28px 32px", marginBottom:24, color:"#fff", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:16 }}>
                  <div>
                    <div style={{ fontSize:22, fontWeight:900 }}>Namaste, {currentUser.name.split(" ")[0]}! 🙏</div>
                    <div style={{ color:"#ffffff90", fontSize:14, marginTop:4 }}>{currentUser.ward} • {isAdmin?"Admin Panel":"Citizen Portal"}</div>
                  </div>
                  {!isAdmin && <button onClick={()=>setShowReport(true)} style={{ background:`linear-gradient(135deg,${C.saffron},${C.gold})`, color:"#fff", border:"none", padding:"14px 28px", borderRadius:14, fontWeight:800, fontSize:15, cursor:"pointer" }}>+ Report Issue</button>}
                </div>
                <div style={{ display:"flex", gap:16, marginBottom:24, flexWrap:"wrap" }}>
                  <StatCard icon="📋" label="Total Issues"  value={stats.total}      color={C.navy}/>
                  <StatCard icon="🔴" label="Open"          value={stats.open}       sub="Needs attention" color={C.red}/>
                  <StatCard icon="🔵" label="In Progress"   value={stats.inProgress} sub="Being worked on"  color={C.blue}/>
                  <StatCard icon="✅" label="Resolved"      value={stats.resolved}   sub="Completed"        color={C.green}/>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr", gap:20 }}>
                  <div>
                    <div style={{ fontWeight:800, color:C.navy, fontSize:16, marginBottom:14 }}>Recent Issues</div>
                    {issues.slice(0,3).map(issue => <IssueCard key={issue.id} issue={issue} isAdmin={isAdmin} onUpdate={handleUpdateIssue}/>)}
                  </div>
                  <div>
                    <div style={{ fontWeight:800, color:C.navy, fontSize:16, marginBottom:14 }}>Quick Actions</div>
                    <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                      {!isAdmin && [
                        { icon:"🚰", label:"Water complaint" },
                        { icon:"💡", label:"Streetlight issue" },
                        { icon:"🛣️", label:"Road / pothole" },
                        { icon:"📄", label:"Certificate help" },
                      ].map(a => (
                        <button key={a.label} onClick={()=>setShowReport(true)} style={{ background:"#fff", border:`1px solid ${C.gray300}`, borderRadius:12, padding:"12px 16px", display:"flex", alignItems:"center", gap:12, cursor:"pointer", textAlign:"left" }}>
                          <span style={{ fontSize:20 }}>{a.icon}</span>
                          <span style={{ fontWeight:700, color:C.navy, fontSize:13 }}>{a.label}</span>
                        </button>
                      ))}
                      {isAdmin && [
                        { icon:"📊", label:"View all issues",   action:()=>setActiveTab("issues") },
                        { icon:"📜", label:"Manage schemes",    action:()=>setActiveTab("schemes") },
                        { icon:"🤝", label:"Schedule meeting",  action:()=>setActiveTab("meetings") },
                      ].map(a => (
                        <button key={a.label} onClick={a.action} style={{ background:"#fff", border:`1px solid ${C.gray300}`, borderRadius:12, padding:"12px 16px", display:"flex", alignItems:"center", gap:12, cursor:"pointer", textAlign:"left" }}>
                          <span style={{ fontSize:20 }}>{a.icon}</span>
                          <span style={{ fontWeight:700, color:C.navy, fontSize:13 }}>{a.label}</span>
                        </button>
                      ))}
                    </div>
                    <div style={{ background:`linear-gradient(135deg,${C.greenPale},${C.cream})`, borderRadius:16, padding:16, marginTop:16, border:`1px solid ${C.greenLight}` }}>
                      <div style={{ fontWeight:800, color:C.green, fontSize:13, marginBottom:8 }}>📅 NEXT MEETING</div>
                      <div style={{ fontWeight:700, color:C.navy, fontSize:14 }}>{MEETINGS[0].title}</div>
                      <div style={{ color:C.gray500, fontSize:12 }}>{MEETINGS[0].date} • {MEETINGS[0].time}</div>
                      <div style={{ color:C.gray500, fontSize:12 }}>{MEETINGS[0].venue}</div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ISSUES */}
            {activeTab==="issues" && (
              <div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20, flexWrap:"wrap", gap:12 }}>
                  <div style={{ fontWeight:800, color:C.navy, fontSize:20 }}>{isAdmin?"All Issues":"Community Issues"}</div>
                  <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                    {!isAdmin && <button onClick={()=>setShowReport(true)} style={{ background:`linear-gradient(135deg,${C.saffron},${C.gold})`, color:"#fff", border:"none", padding:"10px 20px", borderRadius:12, fontWeight:700, cursor:"pointer" }}>+ Report Issue</button>}
                    <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{ padding:"10px 14px", borderRadius:10, border:`1px solid ${C.gray300}`, fontSize:13, background:"#fff" }}>
                      {["All","Open","In Progress","Under Review","Resolved"].map(s=><option key={s}>{s}</option>)}
                    </select>
                    <select value={filterLevel} onChange={e=>setFilterLevel(e.target.value)} style={{ padding:"10px 14px", borderRadius:10, border:`1px solid ${C.gray300}`, fontSize:13, background:"#fff" }}>
                      {["All","ward","gram","municipality"].map(s=><option key={s}>{s}</option>)}
                    </select>
                  </div>
                </div>
                <div style={{ marginBottom:12, color:C.gray500, fontSize:13 }}>{filteredIssues.length} issues found</div>
                {filteredIssues.map(issue=><IssueCard key={issue.id} issue={issue} isAdmin={isAdmin} onUpdate={handleUpdateIssue}/>)}
              </div>
            )}

            {/* SCHEMES */}
            {activeTab==="schemes" && (
              <div>
                <div style={{ fontWeight:800, color:C.navy, fontSize:20, marginBottom:20 }}>Government Schemes • सरकारी योजनाएं</div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:16 }}>
                  {SCHEMES.map(s => (
                    <div key={s.id} style={{ background:"#fff", borderRadius:16, border:`1px solid ${C.gray300}`, overflow:"hidden" }}>
                      <div style={{ background:`linear-gradient(135deg,${C.green}20,${C.navy}10)`, padding:"16px 20px", borderBottom:`1px solid ${C.gray300}` }}>
                        <div style={{ fontWeight:800, color:C.navy, fontSize:15, marginBottom:6 }}>{s.name}</div>
                        <Badge text={s.category}/>
                      </div>
                      <div style={{ padding:"16px 20px" }}>
                        {[["Benefit",s.benefit,C.green],["Eligible",s.eligibility,C.navy],["Deadline",s.deadline,C.saffron],["Applied",s.applied+" applicants",C.navy]].map(([k,v,c])=>(
                          <div key={k} style={{ display:"flex", gap:8, marginBottom:6 }}>
                            <span style={{ fontSize:12, color:C.gray500, minWidth:72 }}>{k}</span>
                            <span style={{ fontSize:13, fontWeight:k==="Benefit"||k==="Deadline"?700:400, color:c }}>{v}</span>
                          </div>
                        ))}
                        <button onClick={()=>showToast(`Application for ${s.name} initiated!`)} style={{ marginTop:12, width:"100%", background:`linear-gradient(135deg,${C.green},${C.navyMid})`, color:"#fff", border:"none", padding:10, borderRadius:10, fontWeight:700, cursor:"pointer", fontSize:13 }}>
                          Apply Now / आवेदन करें
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* MEETINGS */}
            {activeTab==="meetings" && (
              <div>
                <div style={{ fontWeight:800, color:C.navy, fontSize:20, marginBottom:20 }}>Public Meetings • सभाएं</div>
                {MEETINGS.map(m => (
                  <div key={m.id} style={{ background:"#fff", borderRadius:16, border:`1px solid ${C.gray300}`, padding:"20px 24px", marginBottom:16 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:12 }}>
                      <div>
                        <div style={{ fontWeight:800, color:C.navy, fontSize:17, marginBottom:6 }}>{m.title}</div>
                        <div style={{ fontSize:13, color:C.gray500 }}>📅 {m.date} • ⏰ {m.time}</div>
                        <div style={{ fontSize:13, color:C.gray500 }}>📍 {m.venue}</div>
                        <div style={{ fontSize:13, color:C.green, fontWeight:700 }}>👥 {m.attendees} registered</div>
                      </div>
                      <button onClick={()=>showToast(`Registered for ${m.title}!`)} style={{ background:`linear-gradient(135deg,${C.green},${C.navyMid})`, color:"#fff", border:"none", padding:"12px 24px", borderRadius:12, fontWeight:700, cursor:"pointer" }}>Register / पंजीकरण</button>
                    </div>
                    <div style={{ marginTop:16, background:C.gray100, borderRadius:12, padding:14 }}>
                      <div style={{ fontSize:12, fontWeight:700, color:C.gray700, marginBottom:8 }}>AGENDA</div>
                      {m.agenda.map((a,i)=><div key={i} style={{ fontSize:13, color:C.navy, padding:"4px 0", borderBottom:i<m.agenda.length-1?`1px solid ${C.gray300}`:"none" }}>• {a}</div>)}
                    </div>
                  </div>
                ))}
              </div>
            )}

          </div>

          {/* AI FAB */}
          <button onClick={()=>setShowChat(!showChat)} style={{ position:"fixed", bottom:24, right:24, width:56, height:56, background:`linear-gradient(135deg,${C.green},${C.navyMid})`, border:"none", borderRadius:"50%", cursor:"pointer", fontSize:24, boxShadow:"0 8px 24px rgba(45,106,79,0.5)", zIndex:500, display:"flex", alignItems:"center", justifyContent:"center" }}>
            {showChat?"✕":"🤖"}
          </button>

          {showChat  && <AIChat onClose={()=>setShowChat(false)}/>}
          {showReport && <ReportModal onClose={()=>setShowReport(false)} onSubmit={handleSubmitIssue}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
